<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Частые ошибки интерфейсов</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="../src/blocks/best-problems/styles.css" />
  </head>
  <body>
    <a class="back-link" href="../">Все блоки</a>
    <main>
      <section class="section section-beige" aria-labelledby="situations-title">
        <div class="container section-grid">
          <div class="section-head reveal">
            <p class="section-number">01</p>
            <h2 id="situations-title"><span>ЧАСТЫЕ</span><span>ОШИБКИ</span><span>ИНТЕРФЕЙСОВ</span></h2>
          </div>
          <div class="problem-list problem-board reveal">
            <svg class="board-lines" viewBox="0 0 760 520" aria-hidden="true" focusable="false">
              <path class="board-line board-line--1" d="M182 142 C286 124 420 128 574 150" />
              <path class="board-line board-line--2" d="M574 170 C528 258 448 320 310 376" />
              <path class="board-line board-line--3" d="M310 398 C420 410 526 398 636 382" />
            </svg>
            <article class="problem-card problem-card--sticker">
              <span class="note-pin"></span>
              <span class="note-index">01</span>
              <span class="card-line"></span>
              <p>Нет визуальной иерархии.</p>
            </article>
            <article class="problem-card problem-card--paper">
              <span class="note-tape"></span>
              <span class="note-index">02</span>
              <span class="card-line"></span>
              <p>Все элементы одинаково важны.</p>
            </article>
            <article class="problem-card problem-card--marker">
              <span class="note-pin"></span>
              <span class="note-index">03</span>
              <span class="card-line"></span>
              <p>Пользователь не понимает, куда нажать.</p>
            </article>
            <article class="problem-card problem-card--document">
              <span class="note-tape note-tape--small"></span>
              <span class="note-index">04</span>
              <span class="card-line"></span>
              <p>Экран перегружен информацией.</p>
            </article>
          </div>
        </div>
      </section>
    </main>
    <script src="https://cdn.jsdelivr.net/npm/lenis@1.3.23/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/gsap.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.15.0/dist/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/split-type@0.3.4/umd/index.min.js"></script>
    <script src="../src/blocks/best-problems/main.js"></script>
  </body>
</html>
