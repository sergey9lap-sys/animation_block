<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Живой интерфейс</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="stylesheet" href="../src/blocks/mk-contact/styles.css?v=20260715-1" />
  </head>
  <body>
    <a class="back-link" href="../">Все блоки</a>
    <main>
      <section class="final-cta support-section" data-support>
        <div class="ambient-questions" aria-hidden="true">
          <span>Подсказка</span>
          <span>Сохраняем</span>
          <span>Готово</span>
          <span>Ответ</span>
        </div>
        <div class="support-copy">
          <span class="kicker">Микрореакции</span>
          <h2>ЖИВОЙ ИНТЕРФЕЙС</h2>
          <p>Состояния, подсказки и короткие реакции делают экран понятным в момент взаимодействия.</p>
          <div class="support-actions">
            <a href="#">Сохранено</a>
            <a href="#">Готово</a>
            <a href="#">Принято</a>
          </div>
        </div>
        <div class="support-phone-wrap">
          <span class="flying-question flying-question-1" data-question>Новая заявка</span>
          <span class="flying-question flying-question-2" data-question>Ответ готов</span>
          <span class="flying-question flying-question-3" data-question>Материал открыт</span>
          <span class="flying-question flying-question-4" data-question>Оплата прошла</span>
          <span class="flying-question flying-question-5" data-question>Код принят</span>
          <img src="../public/photo_2026-06-12%2022.55.52-portrait.png?v=20260707-2" alt="Телефон с живым интерфейсом" />
        </div>
      </section>
    </main>
    <script src="../src/animation-loader.js" data-animation-src="../src/blocks/mk-contact/main.js"></script>
  </body>
</html>
